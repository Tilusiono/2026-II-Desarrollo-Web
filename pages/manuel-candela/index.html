<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bextor</title>
</head>
<body>
<body>

    <fieldset style="border-color: black;">
        <header>
            <img src="Imagenes/Logo.jpeg" alt="Logo Bextor" width="150">
            
            <ul>
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#categorias">Categorías</a></li>
                <li><a href="#productos">Productos</a></li>
                <li><a href="#pedidos">Pedidos</a></li>
            </ul>

            <input type="text" placeholder="Buscar Productos">
            <button type="button">Buscar</button>
        </header>

    <section id="pedidos">
        
        <fieldset style="border-color: black;">
            <legend><h2>Realizar Pedido</h2></legend>
            
            <form action="#">

                <fieldset>
                    <legend>Información personal</legend>
                    
                    <div style="display: inline-block; margin-right: 15px;">
                        <label>Nombre:</label>
                        <input type="text">
                    </div>
                    
                    <div style="display: inline-block; margin-right: 15px;">
                        <label>Correo:</label>
                        <input type="email">
                    </div>
                    
                    <div style="display: inline-block;">
                        <label>Teléfono:</label>
                        <input type="tel">
                    </div>
                </fieldset>

                <br>

                <fieldset>
                    <legend>Pedido</legend>
                    
                    <div style="display: inline-block; margin-right: 15px;">
                        <label>Cantidad:</label>
                        <input type="number" min="1" max="10">
                    </div>
                    
                    <div style="display: inline-block; margin-right: 15px;">
                        <label>Fecha de Entrega:</label>
                        <input type="date">
                    </div>
                    
                    <div style="display: inline-block;">
                        <label>Dirección:</label>
                        <input type="search">
                    </div>
                </fieldset>

                <br>

                <fieldset>
                    <legend>Pago</legend>
                    
                    <div style="display: inline-block; margin-right: 15px;">
                        <label>
                            <input type="radio" name="metodo_pago" value="yape"> Yape
                        </label>
                    </div>

                    <div style="display: inline-block; margin-right: 15px;">
                        <label>
                            <input type="radio" name="metodo_pago" value="plin"> Plin
                        </label>
                    </div>
                    
                    <div style="display: inline-block;">
                        <label>
                            <input type="radio" name="metodo_pago" value="transferencia"> Transferencia
                        </label>
                    </div>
                </fieldset>

                <br>

                <fieldset>
                    <legend>Servicios</legend>
                    
                    <div style="display: inline-block; margin-right: 15px;">
                        <label>
                            <input type="checkbox" name="adicional" value="delivery"> Delivery
                        </label>
                    </div>
                    
                    <div style="display: inline-block;">
                        <label>
                            <input type="checkbox" name="adicional" value="empaque"> Empaque premium
                        </label>
                    </div>
                </fieldset>

                <br>

                <p>
                    <input type="submit" value="Enviar Formulario de Pedido">
                </p>

            </form>

        </fieldset>

    </section>

</body>
</html>
