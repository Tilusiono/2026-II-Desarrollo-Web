<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Clientes - Pollería JHOALS</title>
    <link rel="stylesheet" href="css/">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" 
          crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    

</head>
<body class="bg-light">

    <!-- HEADER FIJO -->
    <header class="container py-3 d-flex justify-content-between align-items-center">
        <div class="logo d-flex align-items-center gap-2">
            <img src="img/logo.png" alt="Logo JHOALS" style="height: 55px; width: auto;">
            <h1 class="h3 mb-0 fw-bold text-dark">JHOALS</h1>
        </div>
        
        <nav class="d-flex gap-3 align-items-center">
            <a href="index.html#inicio" class="text-decoration-none text-dark">Inicio</a>
            <a href="index.html#menu" class="text-decoration-none text-dark">Menú</a>
            <a href="index.html#categorias" class="text-decoration-none text-dark">Especialidades</a>
            <a href="index.html#locales" class="text-decoration-none text-dark">Locales</a>
            <a href="index.html#nosotros" class="text-decoration-none text-dark">Nosotros</a>
            <a href="formulario.html" class="nav-link-custom">Únete</a>
            <a href="index.html#contacto" class="text-decoration-none text-dark">Contacto</a>
        </nav>
    </header>

    <!-- Espaciador para compensar el header fijo -->
    <div class="header-spacer"></div>

    <!-- Contenido del Formulario -->
    <div class="container d-flex justify-content-center align-items-center py-5">
        <div class="card shadow-lg p-4" style="max-width: 550px; width: 100%; border-radius: 20px; border-top: 8px solid #ff6600;">
            
            <div class="text-center mb-4">
                <i class="bi bi-person-plus-fill text-warning" style="font-size: 3rem;"></i>
                <h2 class="fw-bold text-dark mt-3">Crear Cuenta</h2>
                <p class="text-muted">Regístrate y disfruta de promociones exclusivas, descuentos y novedades de JHOALS.</p>
            </div>

            <form id="registroForm" action="#" method="post" novalidate>
                <!-- ... (el resto del formulario se mantiene igual) ... -->
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Nombres <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="nombres" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Apellidos <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="apellidos" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-semibold">Correo Electrónico <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" id="email" placeholder="ejemplo@correo.com" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Teléfono <span class="text-danger">*</span></label>
                        <input type="tel" class="form-control" id="telefono" placeholder="999 123 456" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Fecha de Nacimiento <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" id="fechaNacimiento" required>
                    </div>

                    <div class="col-md-8">
                        <label class="form-label fw-semibold">Dirección <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="direccion" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Distrito <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="distrito" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-semibold">Contraseña <span class="text-danger">*</span></label>
                        <input type="password" class="form-control" id="password" minlength="8" required>
                        <small class="text-muted">Mínimo 8 caracteres</small>
                    </div>
                </div>

                <div class="form-check mt-4 mb-4">
                    <input class="form-check-input" type="checkbox" id="terminos" required>
                    <label class="form-check-label small text-secondary" for="terminos">
                        Acepto las <a href="#" class="text-decoration-underline">políticas de privacidad</a> y 
                        <a href="#" class="text-decoration-underline">términos de servicio</a>.
                    </label>
                </div>

                <button type="submit" class="btn btn-custom w-100 py-3 fs-5 fw-bold">
                    <i class="bi bi-check-circle me-2"></i>Crear Cuenta
                </button>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
            crossorigin="anonymous"></script>

    <script>
        // Validación del formulario
        document.getElementById('registroForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (this.checkValidity()) {
                alert('¡Registro exitoso! 🎉 Bienvenido a JHOALS.');
            } else {
                this.classList.add('was-validated');
            }
        });
    </script>
</body>
</html>
