<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Clientes - Pollería JHOALS</title>
    <link rel="stylesheet" href="css/formulario.css">
</head>
<body>

    <div class="contenedor">
        <div class="formulario">
            <h1>Pollería JHOALS</h1>
            <p>Regístrate y accede a promociones exclusivas, descuentos y novedades.</p>

            <form action="#" method="post">

                <div class="grupo">
                    <label>Nombres</label>
                    <input type="text" required>
                </div>

                <div class="grupo">
                    <label>Apellidos</label>
                    <input type="text" required>
                </div>

                <div class="grupo">
                    <label>Correo Electrónico</label>
                    <input type="email" required>
                </div>

                <div class="grupo">
                    <label>Teléfono</label>
                    <input type="tel" required>
                </div>

                <div class="grupo">
                    <label>Dirección</label>
                    <input type="text" required>
                </div>

                <div class="grupo">
                    <label>Distrito</label>
                    <input type="text" required>
                </div>

                <div class="grupo">
                    <label>Fecha de Nacimiento</label>
                    <input type="date" required>
                </div>

                <div class="grupo">
                    <label>Contraseña</label>
                    <input type="password" required>
                </div>

                <div class="checkbox">
                    <input type="checkbox" required>
                    <span>Acepto las políticas de privacidad y términos de servicio.</span>
                </div>

                <button type="submit">Crear Cuenta</button>

            </form>

        </div>
    </div>

</body>
</html>
